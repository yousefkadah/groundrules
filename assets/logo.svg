<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Groundrules logo">
  <defs>
    <linearGradient id="gr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#gr)"/>
  <!-- three "rules" of decreasing width -->
  <rect x="64" y="84"  width="128" height="13" rx="6.5" fill="#FFFFFF"/>
  <rect x="64" y="112" width="100" height="13" rx="6.5" fill="#FFFFFF" opacity="0.82"/>
  <rect x="64" y="140" width="72"  height="13" rx="6.5" fill="#FFFFFF" opacity="0.64"/>
  <!-- the ground / baseline -->
  <rect x="64" y="171" width="128" height="16" rx="8" fill="#FFFFFF"/>
  <!-- accent: the "cursor" landing on a rule -->
  <circle cx="150" cy="146.5" r="9" fill="#FBBF24"/>
</svg>
